<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Tools Admin</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="admin-page admin-checking">
    <section class="admin-access-panel hidden" id="adminGate" aria-label="Admin access required">
      <div class="passcode-card">
        <p class="eyebrow">Admin access</p>
        <h1>Access Required</h1>
        <p class="config-note" id="adminAccessMessage">Log in from the main app with an admin account to access this page.</p>
        <a class="primary-button" href="../index.html">Return to app</a>
      </div>
    </section>

    <main class="app-shell">
      <div class="dashboard-frame">
        <header class="topbar">
          <div>
            <p class="eyebrow">Hidden admin</p>
            <h1>Admin</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button logout-button" type="button" id="adminLogoutButton">Logout</button>
          </div>
        </header>

        <section class="admin-grid">
          <section class="table-panel admin-users-panel" aria-label="User passcodes table">
            <div class="table-tools">
              <div>
                <div class="calculator-card-label">User Passcodes</div>
              </div>
              <div class="admin-passcode-row">
                <input id="firstNameInput" type="text" placeholder="First name" />
                <input id="lastNameInput" type="text" placeholder="Last name" />
                <input id="emailInput" type="email" placeholder="Email" />
                <select id="roleInput" aria-label="Role">
                  <option value="user">User</option>
                  <option value="admin">Admin</option>
                </select>
                <button class="primary-button" type="button" id="generateUserCodeButton">Generate code</button>
              </div>
            </div>
            <div class="table-wrap admin-passcode-table-wrap">
              <table class="admin-passcode-table">
                <thead>
                  <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Code</th>
                    <th>Created</th>
                    <th>Last Login</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="adminPasscodeList"></tbody>
              </table>
            </div>
            <p class="admin-empty-passcodes" id="adminEmptyPasscodes">No user passcodes generated yet.</p>
          </section>
        </section>
      </div>
    </main>

    <script src="../supabase-config.js"></script>
    <script src="../supabase-api.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
